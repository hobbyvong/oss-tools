# ==================== 数据库配置 ====================
# 数据库类型：mysql 或 postgresql (根据表结构，如果是 openGauss 请使用 postgresql)
db.type = mysql

# MySQL 示例
db.url = jdbc:mysql://localhost:3306/net_disk?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
# PostgreSQL/openGauss 示例
# db.url = jdbc:postgresql://localhost:5432/net_disk

db.username = root
db.password = your_password

# 文件表名
db.table.name = file

# Schema 名称 (PostgreSQL/openGauss 使用，MySQL 可忽略)
db.schema.name = net_disk

# ==================== 阿里云 OSS 配置 ====================
# 阿里云 OSS Endpoint (根据实际区域修改)
aliyun.endpoint = oss-cn-hangzhou.aliyuncs.com

# 阿里云 AccessKey
aliyun.access.key.id = your_aliyun_access_key_id
aliyun.access.key.secret = your_aliyun_access_key_secret

# 阿里云 OSS Bucket 名称
aliyun.bucket.name = your-aliyun-bucket-name

# ==================== 华为云 OBS 配置 ====================
# 华为云 OBS Endpoint (根据实际区域修改)
huawei.endpoint = obs.cn-north-4.myhuaweicloud.com

# 华为云 AccessKey
huawei.access.key.id = your_huawei_access_key_id
huawei.secret.access.key = your_huawei_secret_access_key

# 华为云 OBS Bucket 名称
huawei.bucket.name = your-huawei-bucket-name

# ==================== 迁移配置 ====================
# 每次查询的记录数
migration.batch.size = 100

# 并发线程数
migration.thread.count = 5

# 仅迁移生效的文件 (file_status=1)
migration.only.valid = true

# 迁移后是否删除阿里云上的文件 (true/false，生产环境建议先设为 false)
migration.delete.after = false

# 源存储类型标识 (数据库中当前存储类型)
migration.source.type = 1

# 目标存储类型标识 (数据库中迁移后的存储类型)
migration.target.type = 2
